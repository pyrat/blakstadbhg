{{ define "main" }}
<section class="py-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="section-title mb-12">{{ .Title }}</h1>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="card p-6 hover:shadow-lg transition-shadow group">
        <h2 class="font-serif font-bold text-xl text-forest-900 group-hover:text-forest-700 mb-2 transition-colors">{{ .Title }}</h2>
        {{ with .Description }}
        <p class="text-gray-500 text-sm">{{ . }}</p>
        {{ end }}
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
