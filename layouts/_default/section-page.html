{{ define "main" }}

{{/* ── Page hero banner ── */}}
<section class="bg-gradient-to-br from-forest-800 to-forest-900 text-white py-20 md:py-28 relative overflow-hidden">
  <div class="absolute inset-0 opacity-10"
       style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 32px 32px;"></div>
  <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    {{ with .Params.label }}<span class="section-label text-forest-400">{{ . }}</span>{{ end }}
    <h1 class="font-serif text-4xl md:text-5xl font-bold text-white mt-2 mb-4 max-w-3xl">{{ .Title }}</h1>
    {{ with .Description }}<p class="text-forest-200 text-xl max-w-2xl">{{ . }}</p>{{ end }}
  </div>
</section>

{{/* ── Body ── */}}
<section class="py-16 md:py-24 bg-sand-50">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="prose prose-lg max-w-none
                prose-headings:font-serif prose-headings:text-forest-900
                prose-h2:text-2xl prose-h3:text-xl
                prose-a:text-forest-700 prose-a:no-underline hover:prose-a:underline
                prose-strong:text-forest-900
                prose-li:marker:text-forest-500
                prose-blockquote:border-forest-400 prose-blockquote:text-forest-800
                prose-blockquote:bg-forest-50 prose-blockquote:rounded-xl prose-blockquote:px-6 prose-blockquote:py-2">
      {{ .Content }}
    </div>
  </div>
</section>

{{ end }}
